name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: packages/agent-mux-mcp
        run: npm ci

      - name: Build
        working-directory: packages/agent-mux-mcp
        run: npm run build

      - name: Test
        working-directory: packages/agent-mux-mcp
        run: npm test

      - name: Publish
        working-directory: packages/agent-mux-mcp
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
